{{ define "main" }}
<div class="page-header">
  <h1>{{ .Title }}</h1>
</div>

<div class="tag-cloud">
  {{ range .Data.Terms.Alphabetical }}
  <a href="{{ .Page.RelPermalink }}" class="tag tag--large">
    {{ .Page.Title }} <span class="tag-count">{{ .Count }}</span>
  </a>
  {{ end }}
</div>
{{ end }}
